<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Operations - Admin & Kitchen Management</title>
    <!-- Tailwind CSS for Modern Production Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .completed-batch {
            opacity: 0.45;
            filter: grayscale(0.5);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 font-sans antialiased">

    <!-- ==================== LOGIN SCREEN ==================== -->
    <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="text-center mb-6">
                <div class="inline-flex p-3 bg-orange-100 text-orange-600 rounded-full mb-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-900">Portal Login</h2>
                <p class="text-xs text-slate-500 mt-1">Sign in with Admin or Kitchen Staff credentials</p>
            </div>
            
            <form onsubmit="event.preventDefault(); loginDashboard();" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Username</label>
                    <input type="text" id="dashUser" placeholder="Enter username" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 text-sm outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Password</label>
                    <input type="password" id="dashPass" placeholder="••••••••" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 text-sm outline-none transition">
                </div>
                <button type="submit" class="w-full py-3 bg-orange-600 hover:bg-orange-700 text-white font-bold rounded-lg shadow-md hover:shadow-lg transition duration-200">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- ==================== MAIN DASHBOARD ==================== -->
    <div id="dashboardScreen" class="hidden max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- HEADER BAR -->
        <header class="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Restaurant Operations Portal</h1>
                <p id="roleBadge" class="text-xs font-semibold text-orange-600 mt-1 inline-block bg-orange-50 px-2.5 py-1 rounded-md border border-orange-200"></p>
            </div>
            <div class="flex items-center gap-3">
                <button id="btnClearAll" onclick="clearAllOrders()" class="hidden px-4 py-2 bg-red-500 hover:bg-red-600 text-white text-xs font-bold rounded-lg transition shadow-sm">
                    🗑️ Clear All System Tables
                </button>
                <button onclick="logoutDashboard()" class="px-4 py-2 bg-slate-700 hover:bg-slate-800 text-white text-xs font-bold rounded-lg transition shadow-sm">
                    🚪 Logout
                </button>
            </div>
        </header>

        <!-- LIVE NOTIFICATIONS FOR ADMIN -->
        <div id="adminNotificationArea" class="space-y-3"></div>

        <!-- ADMIN PANEL: STAFF MANAGEMENT -->
        <section id="adminPanel" class="hidden bg-white p-6 rounded-2xl shadow-sm border border-blue-200 space-y-4">
            <div class="border-b border-slate-100 pb-3">
                <h3 class="text-lg font-bold text-blue-600 flex items-center gap-2">
                    <span>⚙️</span> Staff Account Management
                </h3>
                <p class="text-xs text-slate-500">Create login accounts for kitchen and floor staff</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <input type="text" id="staffName" placeholder="Full Staff Name" class="px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="staffUser" placeholder="Assign Username" class="px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="staffPass" placeholder="Assign Password" class="px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="createStaffAccount()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg text-sm transition">
                    + Create Staff
                </button>
            </div>
            <div>
                <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Active Staff Accounts</h4>
                <div id="staffList" class="flex flex-wrap gap-2 text-sm text-slate-600">No staff created.</div>
            </div>
        </section>

        <!-- ORDERS CONTAINER -->
        <main id="orders" class="space-y-6"></main>
    </div>

    <!-- ==================== JAVASCRIPT CORE ==================== -->
    <script>
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "adminpassword";

        let currentActiveUser = null;
        let knownOrderCount = 0;

        // 🔊 Audio Alert Utility
        function playAudioBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(587.33, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch(e) { console.log("Audio play deferred."); }
        }

        // Authentication Engine
        function loginDashboard() {
            const u = document.getElementById("dashUser").value.trim();
            const p = document.getElementById("dashPass").value.trim();

            if (u === ADMIN_USER && p === ADMIN_PASS) {
                currentActiveUser = { name: "System Admin", role: "admin" };
                loadDashboard();
                return;
            }

            const staffAccounts = JSON.parse(localStorage.getItem("staffAccounts")) || [];
            const matchedStaff = staffAccounts.find(s => s.username === u && s.password === p);

            if (matchedStaff) {
                currentActiveUser = { name: matchedStaff.name, role: "staff" };
                loadDashboard();
                return;
            }

            alert("Invalid Credentials!");
        }

        function loadDashboard() {
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("dashboardScreen").classList.remove("hidden");

            document.getElementById("roleBadge").innerText = `Session: ${currentActiveUser.name} (${currentActiveUser.role.toUpperCase()})`;

            if (currentActiveUser.role === "admin") {
                document.getElementById("adminPanel").classList.remove("hidden");
                document.getElementById("btnClearAll").classList.remove("hidden");
                renderStaffList();
            } else {
                document.getElementById("adminPanel").classList.add("hidden");
                document.getElementById("btnClearAll").classList.add("hidden");
            }

            displayOrders();
        }

        function logoutDashboard() {
            currentActiveUser = null;
            document.getElementById("dashboardScreen").classList.add("hidden");
            document.getElementById("loginScreen").classList.remove("hidden");
            document.getElementById("dashUser").value = "";
            document.getElementById("dashPass").value = "";
        }

        // Staff Account Creator (Admin Only)
        function createStaffAccount() {
            const name = document.getElementById("staffName").value.trim();
            const user = document.getElementById("staffUser").value.trim();
            const pass = document.getElementById("staffPass").value.trim();

            if (!name || !user || !pass) {
                alert("Please fill in all staff details.");
                return;
            }

            const staffAccounts = JSON.parse(localStorage.getItem("staffAccounts")) || [];
            if (staffAccounts.some(s => s.username === user) || user === ADMIN_USER) {
                alert("Username already exists!");
                return;
            }

            staffAccounts.push({ name: name, username: user, password: pass });
            localStorage.setItem("staffAccounts", JSON.stringify(staffAccounts));

            alert(`Staff account created for ${name}!`);
            document.getElementById("staffName").value = "";
            document.getElementById("staffUser").value = "";
            document.getElementById("staffPass").value = "";
            renderStaffList();
        }

        function renderStaffList() {
            const staffAccounts = JSON.parse(localStorage.getItem("staffAccounts")) || [];
            const listContainer = document.getElementById("staffList");

            if (staffAccounts.length === 0) {
                listContainer.innerHTML = "<em class='text-slate-400'>No staff accounts created yet.</em>";
                return;
            }

            listContainer.innerHTML = staffAccounts.map((s, idx) => `
                <span class="inline-flex items-center gap-1.5 px-3 py-1 bg-slate-100 border border-slate-200 rounded-lg text-xs font-medium">
                    👤 <b>${s.name}</b> (${s.username}) 
                    <button onclick="deleteStaff(${idx})" class="text-red-500 hover:text-red-700 font-bold ml-1">✕</button>
                </span>
            `).join('');
        }

        function deleteStaff(idx) {
            const staffAccounts = JSON.parse(localStorage.getItem("staffAccounts")) || [];
            staffAccounts.splice(idx, 1);
            localStorage.setItem("staffAccounts", JSON.stringify(staffAccounts));
            renderStaffList();
        }

        // Toggle Item Batch Completion State
        function toggleOrderDone(orderNumber) {
            const orders = JSON.parse(localStorage.getItem('confirmedOrders')) || [];
            const idx = orders.findIndex(o => o.orderNumber == orderNumber);

            if (idx !== -1) {
                orders[idx].status = (orders[idx].status === "Done") ? "Pending" : "Done";
                localStorage.setItem('confirmedOrders', JSON.stringify(orders));
                displayOrders();
            }
        }

        // STAFF ACTION: Sets status to "AlertSent". Clears items from Staff screen & ONLY THEN displays table bill to Admin.
        function markTableCompleteAndNotifyAdmin(tableNum) {
            const orders = JSON.parse(localStorage.getItem('confirmedOrders')) || [];
            orders.forEach(o => {
                if (o.tableNumber == tableNum) {
                    o.status = "AlertSent";
                }
            });
            localStorage.setItem('confirmedOrders', JSON.stringify(orders));
            playAudioBeep();
            alert(`Table ${tableNum} order sent to Admin for billing! Cleared from staff screen.`);
            displayOrders();
        }

        // Main Rendering Pipeline
        function displayOrders() {
            const orders = JSON.parse(localStorage.getItem('confirmedOrders')) || [];
            const ordersContainer = document.getElementById('orders');
            const notificationArea = document.getElementById('adminNotificationArea');
            
            ordersContainer.innerHTML = '';
            notificationArea.innerHTML = '';

            const isAdmin = currentActiveUser && currentActiveUser.role === "admin";
            const isStaff = currentActiveUser && currentActiveUser.role === "staff";

            // Sound alert trigger on new order arrival
            if (orders.length > knownOrderCount) {
                playAudioBeep();
                knownOrderCount = orders.length;
            }

            // Group orders by Table
            const groupedByTable = {};
            orders.forEach(order => {
                const table = order.tableNumber || "Unassigned";
                if (!groupedByTable[table]) {
                    groupedByTable[table] = {
                        tableNumber: table,
                        customerName: order.customerName || 'Guest',
                        customerPhone: order.customerPhone || '',
                        orderBatches: [],
                        grandTotal: 0
                    };
                }
                groupedByTable[table].orderBatches.push(order);
                groupedByTable[table].grandTotal += (order.totalAmount || 0);
            });

            const readyForBillingTables = [];
            let activeTableCount = 0;

            Object.keys(groupedByTable).forEach(tableNum => {
                const tableGroup = groupedByTable[tableNum];
                const alertSent = tableGroup.orderBatches.some(b => b.status === "AlertSent");

                // RULE 1: STAFF PORTAL -> Only display pending/un-alerted orders. Hide once AlertSent.
                if (isStaff) {
                    const pendingBatches = tableGroup.orderBatches.filter(b => b.status !== "AlertSent");
                    if (pendingBatches.length === 0) {
                        return; // Hide table from staff
                    }
                    tableGroup.visibleBatches = pendingBatches;
                }

                // RULE 2: ADMIN PORTAL -> Strictly hide tables UNTIL staff clicks 'Send Alert'
                if (isAdmin) {
                    if (!alertSent) {
                        return; // Hide table from Admin while kitchen is cooking
                    }
                    tableGroup.visibleBatches = tableGroup.orderBatches;
                    readyForBillingTables.push(tableGroup);
                }

                activeTableCount++;

                const tableCard = document.createElement('div');
                tableCard.className = `bg-white rounded-2xl p-6 shadow-sm border-2 ${alertSent ? 'border-emerald-500' : 'border-orange-500'} space-y-4`;

                const batchesHtml = tableGroup.visibleBatches.map(batch => {
                    const isDone = batch.status === "Done" || batch.status === "AlertSent";
                    return `
                        <div class="flex items-center justify-between p-3 rounded-lg bg-slate-50 border-l-4 ${isDone ? 'border-emerald-500 completed-batch' : 'border-blue-500'}">
                            <div>
                                <h5 class="text-xs font-bold text-blue-600">Order ID: #${batch.orderNumber} <span class="text-slate-400 font-normal">(${batch.timestamp || ''})</span></h5>
                                <ul class="text-sm font-medium text-slate-700 mt-1 list-disc list-inside">
                                    ${batch.items.map(item => `<li>${item}</li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                ${isDone 
                                    ? `<span class="text-xs font-bold text-emerald-600">✓ COMPLETED</span>
                                       <button onclick="toggleOrderDone('${batch.orderNumber}')" class="ml-2 text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 px-2.5 py-1 rounded font-semibold">Undo</button>` 
                                    : `<button onclick="toggleOrderDone('${batch.orderNumber}')" class="text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg font-bold transition">Mark Done</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');

                tableCard.innerHTML = `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">📍</span>
                            <h2 class="text-lg font-black text-slate-900">Table ${tableGroup.tableNumber}</h2>
                            ${alertSent ? '<span class="text-xs bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold">READY FOR BILLING</span>' : ''}
                        </div>
                        <div class="text-xs text-slate-500 font-medium">Customer: <b>${tableGroup.customerName}</b> (${tableGroup.customerPhone})</div>
                    </div>

                    <div class="space-y-2">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Order Items</h4>
                        ${batchesHtml}
                    </div>

                    ${isStaff ? `
                        <button onclick="markTableCompleteAndNotifyAdmin('${tableGroup.tableNumber}')" class="w-full py-2.5 bg-cyan-600 hover:bg-cyan-700 text-white text-sm font-bold rounded-xl shadow transition flex items-center justify-center gap-2">
                            🔔 Send Alert to Admin & Clear Kitchen Screen
                        </button>
                    ` : ''}

                    ${isAdmin ? `
                        <div class="pt-3 border-t border-dashed border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div class="text-lg font-black text-slate-900">
                                Grand Total: <span class="text-emerald-600">₹${tableGroup.grandTotal}</span>
                            </div>

                            <div class="flex gap-2 w-full md:w-auto">
                                <button onclick="sendCombinedBillToWhatsApp('${tableGroup.tableNumber}')" class="flex-1 md:flex-none px-4 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold rounded-xl shadow transition flex items-center justify-center gap-2">
                                    📲 Send WhatsApp Bill & Clear
                                </button>
                                <button onclick="closeTable('${tableGroup.tableNumber}')" class="flex-1 md:flex-none px-4 py-2.5 bg-slate-600 hover:bg-slate-700 text-white text-xs font-bold rounded-xl shadow transition">
                                    ✅ Close / Pay Table
                                </button>
                            </div>
                        </div>
                    ` : ''}
                `;

                ordersContainer.appendChild(tableCard);
            });

            if (activeTableCount === 0) {
                ordersContainer.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-2xl border border-slate-200">
                        <p class="text-slate-400 font-medium">${isStaff ? 'No active orders pending in the kitchen.' : 'No bills pending from kitchen staff.'}</p>
                    </div>
                `;
            }

            // ADMIN TOP NOTIFICATION BANNER
            if (isAdmin && readyForBillingTables.length > 0) {
                readyForBillingTables.forEach(tGroup => {
                    const banner = document.createElement('div');
                    banner.className = 'bg-emerald-50 border border-emerald-200 text-emerald-900 p-4 rounded-xl flex justify-between items-center shadow-sm';
                    banner.innerHTML = `
                        <div class="flex items-center gap-2 text-sm font-bold">
                            <span>🔔</span>
                            <span>Kitchen Alert: Table ${tGroup.tableNumber} orders completed and ready! Total Bill: ₹${tGroup.grandTotal}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="sendCombinedBillToWhatsApp('${tGroup.tableNumber}')" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold rounded-lg transition">
                                📲 WhatsApp Bill & Clear
                            </button>
                            <button onclick="this.parentElement.parentElement.remove()" class="text-emerald-700 hover:text-emerald-900 font-bold px-2">✕</button>
                        </div>
                    `;
                    notificationArea.appendChild(banner);
                });
            }
        }

        // WhatsApp Bill Generator & Auto-Purge from Admin
        function sendCombinedBillToWhatsApp(tableNum) {
            const orders = JSON.parse(localStorage.getItem('confirmedOrders')) || [];
            const tableOrders = orders.filter(o => o.tableNumber == tableNum);

            if (tableOrders.length === 0) return;

            const customerPhone = tableOrders[0].customerPhone;
            const customerName = tableOrders[0].customerName || 'Guest';
            const rawPhone = customerPhone ? customerPhone.replace(/[^0-9]/g, '') : '';

            if (!rawPhone) {
                alert("Customer phone number is missing or invalid!");
                return;
            }

            const allItems = [];
            let grandTotal = 0;

            tableOrders.forEach(order => {
                grandTotal += (order.totalAmount || 0);
                if (order.items && Array.isArray(order.items)) {
                    allItems.push(...order.items);
                }
            });

            const formattedItemsText = allItems.map(item => `• ${item}`).join('\n');

            const billText = 
`🧾 *DELICIOUS BITES - FINAL COMBINED BILL*
----------------------------------
*Table No:* ${tableNum}
*Customer Name:* ${customerName}
*Date & Time:* ${new Date().toLocaleTimeString()}
----------------------------------
*ALL ITEMS ORDERED:*
${formattedItemsText}
----------------------------------
*GRAND TOTAL:* ₹${grandTotal}
----------------------------------
Thank you for dining with us! 🙏
Hope to see you again soon!`;

            const encodedBill = encodeURIComponent(billText);
            
            // 1. Launch WhatsApp with bill
            window.open(`https://wa.me/${rawPhone}?text=${encodedBill}`, '_blank');

            // 2. Automatically remove/clear that table's bill from Admin portal database
            const remainingOrders = orders.filter(o => o.tableNumber != tableNum);
            localStorage.setItem('confirmedOrders', JSON.stringify(remainingOrders));

            // 3. Re-render portal view
            displayOrders();
        }

        function closeTable(tableNum) {
            if (confirm(`Close and clear orders for Table ${tableNum}?`)) {
                const orders = JSON.parse(localStorage.getItem('confirmedOrders')) || [];
                const remainingOrders = orders.filter(o => o.tableNumber != tableNum);
                localStorage.setItem('confirmedOrders', JSON.stringify(remainingOrders));
                displayOrders();
            }
        }

        function clearAllOrders() {
            if (confirm("Are you sure you want to clear all tables and orders?")) {
                localStorage.removeItem('confirmedOrders');
                knownOrderCount = 0;
                displayOrders();
            }
        }

        // Event listeners & polling loop
        window.addEventListener('storage', function(e) {
            if (e.key === 'confirmedOrders' && currentActiveUser) {
                displayOrders();
            }
        });
        setInterval(() => { if (currentActiveUser) displayOrders(); }, 2000);
    </script>
</body>
</html>
